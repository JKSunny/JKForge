name: Demo picked
description: Play demos pipeline

steps:
  - id: boot
    type: boot

  - id: wait_10
    type: sleep
    input:
      duration: 10

  - id: run_demos
    type: demo_queue
    input:
      repeat: 2
      demos:
        - demo001.dm_26
        - demo002.dm_26

  - id: quit
    type: exit